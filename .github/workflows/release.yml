name: Nix CD

on:
  push:
    branches:
      - "master"

concurrency:
  group: "master"
  cancel-in-progress: true

jobs:
  check:
    name: "Build and Save Mod"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check
        run: |
          nix flake check --print-build-logs -j auto

      - name: "Build Release"
        run: |
          nix build .# --print-build-logs -j auto
          nix build .#latency-slider-de-classic --print-build-logs -j auto -o result-classic

      - name: "Upload Mod Files"
        uses: actions/upload-artifact@v4
        with:
          name: latency-slider-nro
          path: |
            result/lib/*.nro
            result-classic/lib/*.nro
