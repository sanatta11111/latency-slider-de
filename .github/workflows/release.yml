name: Nix CD

on:
  push:
    branches:
      - "master"

concurrency:
  group: "master"
  cancel-in-progress: true

jobs:
  check:
    name: "Build and Save Mod"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # Node.js 24への強制移行を回避・準備するための環境変数
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # actions/checkoutを最新のv4（内部でNode.js対応が進んでいるもの）を使用
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          # 【重要】FlakeHubの登録なしでビルドできるように設定
          flakehub: false

      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check
        run: |
          nix flake check --print-build-logs -j auto

      - name: "Build Release"
        run: |
          nix build .# --print-build-logs -j auto
          nix build .#latency-slider-de-classic --print-build-logs -j auto -o result-classic

      - name: "Upload Mod Files"
        uses: actions/upload-artifact@v4
        with:
          name: latency-slider-nro
          path: |
            result/lib/*.nro
            result-classic/lib/*.nro